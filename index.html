<!DOCTYPE html>
<html>
<head>
  <title>FIT2179 Assignment 2 - Visualization</title>
  <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>
  
  <style>
    body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    #vis { border: 1px solid #ccc; padding: 10px; }
  </style>
</head>
<body>

  <h1>Socio-Economic Status vs Adult Obesity Rates</h1>
  <div id="vis"></div>

  <script>
    const spec = {
      "$schema": "https://vega.github.io/schema/vega-lite/v5.json",
      "width": 600,
      "height": 400,
      "data": {
        "url": "https://raw.githubusercontent.com/jche0599-cloud/FIT2179_Assignment2/main/obesity_data.csv"
      },
      "transform": [
        {
          "lookup": "lga_code",
          "from": {
            "data": {
              "url": "https://raw.githubusercontent.com/jche0599-cloud/FIT2179_Assignment2/main/seifa_data.csv"
            },
            "key": "lga_code",
            "fields": ["Score"]
          }
        },
        {"filter": "datum.Score != null && datum.obese_rate != null"}
      ],
      "mark": {"type": "circle", "filled": true, "size": 80, "color": "steelblue", "opacity": 0.6},
      "encoding": {
        "x": {"field": "Score", "type": "quantitative", "title": "SEIFA Score (Advantaged)"},
        "y": {"field": "obese_rate", "type": "quantitative", "title": "Obesity Rate (%)"},
        "tooltip": [
          {"field": "lga_name", "type": "nominal", "title": "LGA Name"},
          {"field": "Score", "type": "quantitative", "title": "SEIFA Score"},
          {"field": "obese_rate", "type": "quantitative", "title": "Obesity Rate (%)"}
        ]
      }
    };
    
    vegaEmbed('#vis', spec).catch(console.error);
  </script>
</body>
</html>
